port: 8083
host: 127.0.0.1

providers:
  deepseek:
    name: DeepSeek
    api_key: your-deepseek-key
    auth_type: bearer
  zhipu:
    name: Zhipu GLM
    api_key: your-zhipu-key
    auth_type: bearer
  baidu:
    name: Baidu ERNIE
    api_key: your-baidu-key
    auth_type: bearer
  kimi:
    name: Kimi
    api_key: your-kimi-key
    auth_type: bearer
  dashscope:
    name: Qwen (DashScope)
    api_key: your-dashscope-key
    auth_type: bearer
  dashscope_media:
    name: DashScope Media
    api_key: your-dashscope-key
    auth_type: bearer
  minimax:
    name: MiniMax
    api_key: your-minimax-key
    auth_type: bearer
  groq:
    name: Groq (Whisper ASR)
    api_key: your-groq-key
    auth_type: bearer

routes:
  - base_url: https://api.deepseek.com
    model: deepseek-v4-pro
    provider: deepseek
    tags: [sonnet, auto]
    format: openai

  - base_url: https://api.deepseek.com
    model: deepseek-v4-flash
    provider: deepseek
    tags: [haiku]
    format: openai

  - base_url: https://open.bigmodel.cn/api/anthropic
    model: glm-5.1
    provider: zhipu
    tags: [opus]
    format: anthropic

  - base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    model: qwen3.7-max
    provider: dashscope
    tags: [sonnet]
    format: openai

  - base_url: https://api.kimi.com/coding
    model: K2.6
    provider: kimi
    tags: [sonnet]
    format: anthropic

  - base_url: https://api.deepseek.com
    model: deepseek-v4-pro
    provider: deepseek
    tags: [gpt-5.5, codex]
    format: openai

  # ─── Multimodal routes ────────────────────────────────────────────────
  # The request path is derived from the format (e.g. openai → /v1/chat/completions).
  # base_url is the server root; aginxbrain appends the format's standard path.

  - base_url: https://dashscope.aliyuncs.com
    model: wan2.7-image-pro
    provider: dashscope_media
    tags: [image]
    format: dashscope_image

  - base_url: https://dashscope.aliyuncs.com
    model: cosyvoice-v1
    provider: dashscope_media
    tags: [tts]
    format: dashscope_tts

  - base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    model: qwen-vision-max
    provider: dashscope
    tags: [vision]
    format: openai

  - base_url: https://api.groq.com/openai
    model: whisper-large-v3-turbo
    provider: groq
    tags: [audio]
    format: openai

tags:
  - name: opus
    color: "#A855F7"

  - name: sonnet
    color: "#3B82F6"

  - name: haiku
    color: "#22C55E"

  - name: auto
    color: "#F59E0B"
    is_auto: true

  - name: gpt-5.5
    color: "#10B981"

  - name: codex
    color: "#6366F1"

  - name: image
    color: "#10B981"

  - name: tts
    color: "#F59E0B"

  - name: vision
    color: "#EC4899"

  - name: audio
    color: "#06B6D4"

current_tag: auto
management_key: aginxbrain-local

# Smart auto-routing: when a request arrives with an "auto" tag, inspect the
# request body for signals and dynamically upgrade to a more specific tier.
smart_routing:
  enabled: true
  cache_ttl_secs: 1800
  cache_max_sessions: 1024
  signal_tiers:
    agentic: sonnet
    reasoning: opus
    complex_coding: opus
    subagent: haiku
    code_pattern: sonnet