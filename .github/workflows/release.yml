name: Release

# Build desktop installers for macOS (arm64 + x86_64) and Windows whenever a
# version tag (v*) is pushed, then attach them to a GitHub Release.
#
# Usage:
#   git tag v0.x.x
#   git push origin v0.x.x
#
# We build with the plain `tauri build` CLI and upload artifacts ourselves
# (softprops/action-gh-release) rather than tauri-action's uploader, which
# errors with "No artifacts were found" when the updater isn't signed.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web-client/pnpm-lock.yaml

      - name: Build desktop client frontend
        run: pnpm install --frozen-lockfile && pnpm build
        working-directory: web-client

      - name: Install macOS targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add ${{ matrix.target }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build app bundle
        working-directory: src-tauri
        shell: bash
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            cargo tauri build --target ${{ matrix.target }}
          else
            cargo tauri build
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.platform }}-${{ matrix.target }}
          if-no-files-found: error
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Flatten release assets
        shell: bash
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.dmg" -o -name "*.msi" -o -name "*.exe" \) \
            -exec cp {} release-assets/ \;
          ls -la release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            AginxBrain desktop client. Download the installer for your platform below.

            - **macOS Apple Silicon**: `*_aarch64.dmg`
            - **macOS Intel**: `*_x64.dmg`
            - **Windows**: `*_x64-setup.exe` / `*_x64_en-US.msi`

            Usage: open the app, enter your API key from brain.aginx.net, toggle Claude Code/Codex on.
          files: release-assets/*
