port: 8083
host: 127.0.0.1

providers:
  deepseek:
    name: DeepSeek
    base_url: https://api.deepseek.com
    api_key: your-deepseek-key
    auth_type: bearer
  deepseek_anthropic:
    name: DeepSeek (Anthropic)
    base_url: https://api.deepseek.com/anthropic
    api_key: your-deepseek-key
    auth_type: bearer
  zhipu:
    name: Zhipu GLM
    base_url: https://open.bigmodel.cn/api/anthropic
    api_key: your-zhipu-key
    auth_type: bearer
  baidu:
    name: Baidu ERNIE
    base_url: https://qianfan.baidubce.com/anthropic/coding
    api_key: your-baidu-key
    auth_type: bearer
  kimi:
    name: Kimi
    base_url: https://api.kimi.com/coding
    api_key: your-kimi-key
    auth_type: bearer
  dashscope:
    name: Qwen (DashScope)
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    api_key: your-dashscope-key
    auth_type: bearer
  minimax:
    name: MiniMax
    base_url: https://api.minimaxi.com/anthropic
    api_key: your-minimax-key
    auth_type: bearer

routes:
  - endpoint: /v1/chat/completions
    model: deepseek-v4-pro
    provider: deepseek
    tags: [sonnet, auto]
    format: openai
    modality: chat

  - endpoint: /v1/chat/completions
    model: deepseek-v4-flash
    provider: deepseek
    tags: [haiku]
    format: openai
    modality: chat

  - endpoint: /v1/messages
    model: glm-5.1
    provider: zhipu
    tags: [opus]
    format: anthropic
    modality: chat

  - endpoint: /v1/chat/completions
    model: qwen3.7-max
    provider: dashscope
    tags: [sonnet]
    format: openai
    modality: chat

  - endpoint: /v1/messages
    model: K2.6
    provider: kimi
    tags: [sonnet]
    format: anthropic
    modality: chat

  # Popular client model names can be added as tags without code changes.
  # When a request arrives with model="gpt-5.5", it resolves directly to the
  # "gpt-5.5" tag below. If a future model name is not covered, simply add a
  # new tag and attach it to a route — no restart or redeploy required.
  - endpoint: /v1/chat/completions
    model: deepseek-v4-pro
    provider: deepseek
    tags: [gpt-5.5, codex]
    format: openai
    modality: chat

  # Future media routes (configuration-only in this phase; driver support comes later):
  # - endpoint: /api/v1/services/aigc/text2image/image-synthesis
  #   model: wanx2.1-t2i-plus
  #   provider: dashscope
  #   tags: [image]
  #   format: dashscope_image
  #   modality: image_generation
  #
  # - endpoint: /v1/videos/text2video
  #   model: kling-v1-6
  #   provider: kling
  #   tags: [video]
  #   format: kling
  #   modality: video_generation
  #
  # - endpoint: /api/v1/services/aigc/text-to-speech/stream
  #   model: cosyvoice-v1
  #   provider: dashscope
  #   tags: [tts]
  #   format: dashscope_tts
  #   modality: tts

tags:
  - name: opus
    color: "#A855F7"

  - name: sonnet
    color: "#3B82F6"

  - name: haiku
    color: "#22C55E"

  - name: auto
    color: "#F59E0B"
    is_auto: true

  # Add any client model name as a tag and bind it to a route. No code changes needed.
  - name: gpt-5.5
    color: "#10B981"

  - name: codex
    color: "#6366F1"

current_tag: auto
management_key: aginxbrain-local
